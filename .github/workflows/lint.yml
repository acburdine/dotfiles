name: "Lint"

on: pull_request

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: super-linter/super-linter@9e863354e3ff62e0727d37183162c4a88873df41 # v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          VALIDATE_LUA: "false"
          VALIDATE_BIOME_FORMAT: "false"
          VALIDATE_SPELL_CODESPELL: "false"
